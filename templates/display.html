<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RPI5 AI 展示 — 掃碼連線</title>
<style>
  :root {
    --bg:    #07070f;
    --bg2:   #0e0e1c;
    --bg3:   #16162a;
    --cyan:  #00d4e0;
    --dim:   rgba(0,212,224,0.12);
    --text:  #e8eaf6;
    --muted: #8892b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang TC', 'Heiti TC', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── 背景色漸變 ── */
  body { transition: background 1.2s ease; }
  #color-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .4s;
  }
  #color-overlay.show { opacity: 1; }
  #color-overlay span {
    font-size: 64px; font-weight: 800; letter-spacing: .08em;
    color: rgba(255,255,255,.9); text-shadow: 0 4px 32px rgba(0,0,0,.4);
    text-transform: uppercase;
  }

  /* ── 結果卡片 overlay ── */
  #result-overlay {
    position: absolute; inset: 0; z-index: 110; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .4s;
  }
  #result-overlay.show { opacity: 1; }
  #result-card {
    min-width: 420px; max-width: 70%;
    padding: 32px 44px; border-radius: 24px;
    background: rgba(14, 22, 40, 0.92);
    border: 2px solid rgba(0, 212, 224, 0.4);
    box-shadow: 0 16px 60px rgba(0,0,0,.6), 0 0 40px rgba(0,212,224,.15);
    backdrop-filter: blur(12px);
    text-align: center;
    transform: scale(0.9); transition: transform .4s cubic-bezier(.2,.9,.3,1.2);
  }
  #result-overlay.show #result-card { transform: scale(1); }
  #result-title {
    font-size: 20px; font-weight: 600; color: var(--cyan);
    letter-spacing: .05em; margin-bottom: 12px;
  }
  #result-text {
    font-size: 36px; font-weight: 700; color: var(--text);
    line-height: 1.4; letter-spacing: .02em;
  }

  /* ── 全版面 grid：左側說明 | 右側 QR ── */
  #layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
  }

  /* ── 左側 ── */
  #left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 50px 60px 70px;
    border-right: 1px solid rgba(0,212,224,0.1);
  }

  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--dim); border: 1px solid rgba(0,212,224,0.2);
    border-radius: 40px; padding: 8px 20px;
    font-size: 14px; color: var(--cyan); letter-spacing: .06em;
    width: fit-content; margin-bottom: 32px;
  }
  .badge-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .title {
    font-size: 52px; font-weight: 700; line-height: 1.15;
    margin-bottom: 14px; letter-spacing: -.01em;
  }
  .title span { color: var(--cyan); }

  .subtitle {
    font-size: 20px; color: var(--muted); margin-bottom: 48px; line-height: 1.5;
  }

  /* WiFi card */
  .wifi-card {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
  }
  .wifi-label {
    font-size: 12px; letter-spacing: .12em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .wifi-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.07);
  }
  .wifi-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .wifi-row:last-child { border-bottom: none; }
  .wifi-key { font-size: 14px; color: var(--muted); }
  .wifi-val {
    font-size: 20px; font-weight: 600; font-family: 'SF Mono', 'Consolas', monospace;
    color: var(--text); letter-spacing: .05em;
  }
  .wifi-val.highlight { color: var(--cyan); }

  /* Step hints */
  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step {
    display: flex; align-items: flex-start; gap: 14px;
  }
  .step-num {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: var(--dim); border: 1px solid rgba(0,212,224,0.25);
    color: var(--cyan); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .step-text { font-size: 16px; color: var(--muted); line-height: 1.5; padding-top: 3px; }
  .step-text b { color: var(--text); font-weight: 600; }

  /* ── 右側 QR 區 ── */
  #right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 50px 60px 50px 50px;
  }

  .qr-wrapper {
    position: relative;
    padding: 20px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,212,224,0.15), 0 0 120px rgba(0,212,224,0.06);
  }
  .qr-wrapper img {
    display: block;
    width: 320px; height: 320px;
    image-rendering: pixelated;
  }

  /* 四角裝飾 */
  .corner {
    position: absolute; width: 24px; height: 24px;
    border-color: var(--cyan); border-style: solid;
  }
  .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .qr-hint {
    font-size: 15px; color: var(--muted); text-align: center; letter-spacing: .04em;
  }

  .url-pill {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border: 1px solid rgba(0,212,224,0.2);
    border-radius: 40px; padding: 10px 22px;
  }
  .url-icon { font-size: 14px; }
  .url-text {
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 15px; color: var(--cyan); letter-spacing: .04em;
  }

  /* Status bar */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(7,7,15,0.9);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 40px;
    font-size: 13px; color: var(--muted);
  }
  #status-bar .left-status { display: flex; gap: 24px; align-items: center; }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
  .stat-dot.ok  { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .stat-dot.err { background: #ef4444; }
  #temp-val, #model-val, #uptime-val { color: var(--text); }
</style>
</head>
<body>

<div id="color-overlay"><span id="color-name"></span></div>
<div id="result-overlay">
  <div id="result-card">
    <div id="result-title"></div>
    <div id="result-text"></div>
  </div>
</div>
<div id="layout">

  <!-- ── 左側說明 ── -->
  <div id="left">
    <div class="badge">
      <div class="badge-dot"></div>
      LIVE DEMO · Raspberry Pi 5
    </div>

    <div class="title">
      用語音和<br><span>本地 AI</span> 對話
    </div>
    <div class="subtitle">
      完全離線運行 · 資料不出展場<br>
      270M 模型 · Gemma Function Calling
    </div>

    <div class="wifi-card">
      <div class="wifi-label">📶 連接 WiFi</div>
      <div class="wifi-row">
        <span class="wifi-key">網路名稱</span>
        <span class="wifi-val highlight" id="ssid-val">RPI5-Demo</span>
      </div>
      <div class="wifi-row">
        <span class="wifi-key">密碼</span>
        <span class="wifi-val" id="pass-val">demo1234</span>
      </div>
    </div>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">手機連接 WiFi <b id="ssid-text">RPI5-Demo</b><br>
          <span style="font-size:13px;opacity:.7;">若提示「無網際網路連線」→ 請選擇<b style="color:var(--cyan)">「保持連線」</b></span>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">掃描右側 QR Code，或直接輸入網址</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">允許<b>麥克風</b>權限，點擊按鈕開始語音輸入</div>
      </div>
    </div>
  </div>

  <!-- ── 右側 QR ── -->
  <div id="right">
    <div class="qr-wrapper">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <img id="qr-img" src="/qr.png?t=0" alt="QR Code">
    </div>

    <div class="qr-hint">掃描後在手機瀏覽器開啟</div>

    <div class="url-pill">
      <span class="url-icon">🔒</span>
      <span class="url-text" id="url-text">載入中...</span>
    </div>
  </div>

</div>

<!-- 狀態列 -->
<div id="status-bar">
  <div class="left-status">
    <div class="stat">
      <div class="stat-dot ok" id="server-dot"></div>
      <span>AI 服務</span>
      <span id="model-val">載入中</span>
    </div>
    <div class="stat">
      <div class="stat-dot ok"></div>
      <span>溫度</span>
      <span id="temp-val">—</span>
    </div>
    <div class="stat">
      <div class="stat-dot ok"></div>
      <span>運行時間</span>
      <span id="uptime-val">—</span>
    </div>
  </div>
  <div id="conn-count">連線訪客：<b id="conn-num">0</b></div>
</div>

<script>
// ── 從 /info 取得伺服器資訊 ─────────────────────────────
async function refreshInfo() {
  try {
    const r = await fetch('/info');
    const d = await r.json();

    // URL
    document.getElementById('url-text').textContent = d.url || location.origin;

    // QR（加時間戳防快取）
    document.getElementById('qr-img').src = '/qr.png?t=' + Date.now();

    // Model
    document.getElementById('model-val').textContent = d.model || '—';

    // WiFi 設定（若 /info 有回傳）
    if (d.ssid) {
      document.getElementById('ssid-val').textContent  = d.ssid;
      document.getElementById('ssid-text').textContent = d.ssid;
      document.getElementById('pass-val').textContent  = d.wifi_pass || '—';
    }
  } catch(e) {
    document.getElementById('server-dot').className = 'stat-dot err';
  }
}

// ── 系統狀態輪詢 ──────────────────────────────────────
async function refreshStats() {
  try {
    const r = await fetch('/stats');
    const d = await r.json();
    if (d.temp)   document.getElementById('temp-val').textContent   = d.temp;
    if (d.uptime) document.getElementById('uptime-val').textContent = d.uptime;
    if (d.conns !== undefined)
      document.getElementById('conn-num').textContent = d.conns;
  } catch(e) {}
}

// ── 初始化 ────────────────────────────────────────────
refreshInfo();
refreshStats();
setInterval(refreshInfo,  30000);   // QR + info 每 30 秒刷新
setInterval(refreshStats,  5000);   // 系統狀態每 5 秒更新
setTimeout(() => location.reload(), 3600000);  // 每 1 小時重整，防止記憶體累積

// ── 展示螢幕顏色 WebSocket ─────────────────────────────
const COLOR_CSS = {
  red:    '#c0392b',
  green:  '#27ae60',
  blue:   '#2980b9',
  yellow: '#f39c12',
  purple: '#8e44ad',
  orange: '#d35400',
  black:  '#1a1a1a',
  white:  '#f5f5f5',
};

function connectDisplayWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const dws = new WebSocket(`${proto}//${location.host}/ws/display`);

  dws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'color_change') {
      const color  = msg.color;
      const cssCol = COLOR_CSS[color] || '#1a1a2e';

      // 背景漸變
      document.body.style.background = cssCol;

      // 大字顯示顏色名稱
      const overlay = document.getElementById('color-overlay');
      const label   = document.getElementById('color-name');
      label.textContent = color;
      overlay.classList.add('show');
      setTimeout(() => overlay.classList.remove('show'), 2000);
    } else if (msg.type === 'result') {
      // 顯示工具執行結果卡片
      const overlay = document.getElementById('result-overlay');
      document.getElementById('result-title').textContent = msg.title || '結果';
      document.getElementById('result-text').textContent  = msg.text || '';
      overlay.classList.add('show');
      clearTimeout(window._resultTimer);
      window._resultTimer = setTimeout(() => overlay.classList.remove('show'), 6000);
    }
  };

  dws.onclose = () => setTimeout(connectDisplayWs, 3000);
}

connectDisplayWs();
</script>
</body>
</html>
